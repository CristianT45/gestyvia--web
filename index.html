/* Gestyvia · Transiciones premium entre páginas */
.gv-page-transition{
    position:fixed;
    inset:0;
    z-index:2147483646;
    pointer-events:none;
    background:
        radial-gradient(ellipse at 50% 38%, rgba(196,147,58,.105) 0%, transparent 34%),
        radial-gradient(ellipse at 30% 70%, rgba(42,90,160,.075) 0%, transparent 46%),
        #f8f7f4;
    transform:translateY(100%);
    transition:transform .78s cubic-bezier(.76,0,.24,1);
    will-change:transform;
}
.gv-page-transition::before{
    content:'';
    position:absolute;
    left:50%;
    top:50%;
    width:min(360px,54vw);
    height:1px;
    transform:translate(-50%,-50%);
    background:linear-gradient(90deg,transparent,rgba(196,147,58,.7),transparent);
    opacity:.72;
}
.gv-page-transition::after{
    content:'';
    position:absolute;
    left:50%;
    top:calc(50% + 18px);
    width:42px;
    height:42px;
    transform:translate(-50%,-50%) rotate(45deg);
    border:1px solid rgba(196,147,58,.28);
    opacity:.48;
}
.gv-page-transition.is-active{transform:translateY(0)}
.gv-page-transition.is-entering{
    transform:translateY(0);
    animation:gvPremiumReveal .92s cubic-bezier(.76,0,.24,1) forwards;
}
@keyframes gvPremiumReveal{to{transform:translateY(-100%)}}
@media (prefers-reduced-motion:reduce){
    .gv-page-transition{display:none!important}
}

/* Transición premium entre páginas */
.page-transition{
    position:fixed;
    inset:0;
    background:#f8f7f4;
    z-index:99999;
    transform:translateY(100%);
    opacity:0;
    pointer-events:none;
    transition:
        transform 1.15s cubic-bezier(.77,0,.175,1),
        opacity 1.15s ease;
}
.page-transition.active{
    transform:translateY(0);
    opacity:1;
    pointer-events:all;
}
.page-transition.exit{
    transform:translateY(-100%);
    opacity:0;
}

  function navigate() {
    const wrapper = document.getElementById('wrapper');
    const overlay = document.getElementById('overlay');
    const goldLine = document.getElementById('goldLine');
    // 1. Wrapper: zoom suave + fade out
    wrapper.classList.add('exit');
    goldLine.style.opacity = '0';
    const premiumTransition = document.querySelector('.gv-page-transition');
    if (premiumTransition) {
      premiumTransition.classList.remove('is-entering');
      premiumTransition.classList.add('is-active');
    }
    // 2. Overlay blanco: fade in ligeramente después
    setTimeout(() => {
      overlay.classList.add('active');
    }, 300);
    // 3. Navegar cuando la transición termina
    setTimeout(() => {
      window.location.href = 'marca.html';
    }, 640);
  }
  document.getElementById('logoLink').addEventListener('click', (e) => {
    e.preventDefault();
    navigate();
  });
  document.getElementById('enterLink').addEventListener('click', (e) => {
    e.preventDefault();
    navigate();
  });
  document.body.addEventListener('click', (e) => {
    if (!e.target.closest('a')) navigate();
  });
</script>
<script>
(function(){
    const transition = document.querySelector('.gv-page-transition');
    if(!transition || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    window.addEventListener('pageshow', function(){
        transition.classList.remove('is-active');
        transition.classList.add('is-entering');
        setTimeout(function(){transition.classList.remove('is-entering');}, 950);
    });

    document.addEventListener('click', function(e){
        const link = e.target.closest('a');
        if(!link) return;
        const href = link.getAttribute('href');
        if(!href || href === '#' || href.startsWith('#')) return;
        if(link.target && link.target !== '_self') return;
        if(link.hasAttribute('download')) return;
        if(href.startsWith('mailto:') || href.startsWith('tel:') || href.startsWith('javascript:')) return;

        let targetUrl;
        try{ targetUrl = new URL(href, window.location.href); }
        catch(err){ return; }
        if(targetUrl.origin !== window.location.origin) return;
        if(targetUrl.pathname === window.location.pathname && targetUrl.hash) return;

        e.preventDefault();
        transition.classList.remove('is-entering');
        transition.classList.add('is-active');
        setTimeout(function(){ window.location.href = targetUrl.href; }, 640);
    }, true);
})();
</script>
<script>
(function(){
    const transition = document.getElementById('pageTransition');

    window.addEventListener('pageshow', function(){
        if(!transition) return;
        transition.classList.remove('active');
        transition.classList.remove('exit');
    });

    document.querySelectorAll('a[href]').forEach(function(link){
        link.addEventListener('click', function(e){
            const href = link.getAttribute('href');

            if(
                !href ||
                href.startsWith('#') ||
                href.startsWith('mailto:') ||
                href.startsWith('tel:') ||
                href.startsWith('http') ||
                link.target === '_blank' ||
                link.hasAttribute('download')
            ){
                return;
            }

            e.preventDefault();

            if(transition){
                transition.classList.add('active');
            }

            setTimeout(function(){
                window.location.href = href;
            }, 1050);
        });
    });
})();
</script>
